<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Offline — Lokesh Sain</title>
<link rel="icon" type="image/png" href="/icons/icon-192.png"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,system-ui,sans-serif;background:#fffef7;color:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
  .card{max-width:440px;width:100%;border:2px solid #000;border-radius:16px;padding:clamp(28px,5vw,48px);box-shadow:6px 6px 0 #000;background:#fff;text-align:center}
  .logo{font-size:28px;font-weight:900;letter-spacing:-0.05em;margin-bottom:28px}
  .logo mark{background:#ffde2d;padding:0 7px 2px;border:2px solid #000;border-radius:5px;margin-left:3px;color:#000}
  h1{font-size:clamp(20px,4vw,26px);font-weight:900;letter-spacing:-0.03em;margin-bottom:12px}
  p{font-size:15px;line-height:1.7;color:#555;margin-bottom:28px}
  .badge{display:inline-flex;align-items:center;gap:8px;background:#ffde2d;border:2px solid #000;padding:8px 18px;border-radius:99px;font-weight:700;font-size:13px;box-shadow:3px 3px 0 #000;margin-bottom:24px}
  .dot{width:8px;height:8px;border-radius:50%;background:#000}
  button{background:#000;color:#fff;border:2px solid #000;padding:11px 24px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:4px 4px 0 #555;transition:all .15s;font-family:inherit}
  button:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #555}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Lokesh<mark>Sain</mark></div>
  <div class="badge"><span class="dot"></span> No Internet Connection</div>
  <h1>You're offline</h1>
  <p>Please check your connection. The portfolio will load once you're back online.</p>
  <button onclick="window.location.reload()">Try Again</button>
</div>
</body>
</html>
